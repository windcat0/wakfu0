<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Wakfu 攻略站 · 万象之扉</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(ellipse at 20% 30%, #1a1e2f 0%, #0b0d17 70%);
      background-attachment: fixed;
      color: #e6e9f0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 70vw;
      height: 70vh;
      background: radial-gradient(circle at 50% 40%, rgba(90, 130, 255, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
    }
    .bg-glow.bottom {
      top: auto;
      bottom: -15%;
      left: auto;
      right: -5%;
      background: radial-gradient(circle at 50% 50%, rgba(210, 80, 180, 0.1) 0%, transparent 70%);
      width: 60vw;
      height: 60vh;
    }

    .navbar {
      position: sticky;
      top: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 5%;
      background: rgba(18, 20, 30, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    .navbar .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(to bottom, #2dd4bf 0%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 8px rgba(45, 212, 191, 0.6);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .navbar .logo img {
      height: 2.5rem;
      vertical-align: middle;
    }

    .navbar .logo span {
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.1);
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-weight: 400;
      -webkit-text-fill-color: #ccc;
      background-clip: unset;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
    }

    .nav-links a {
      color: #b9c2d9;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: color 0.2s, text-shadow 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    .nav-links a:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(200, 180, 255, 0.7);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    main {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1350px;
      padding: 2rem 5%;
      margin: 0 auto;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 2rem 1.5rem 1.8rem;
      transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s, border-color 0.3s, background 0.3s;
      cursor: default;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.9rem;
      box-shadow: 0 15px 35px -15px rgba(0, 0, 0, 0.5);
      text-decoration: none;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(105deg, transparent 30%, rgba(255, 255, 255, 0.04) 45%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.04) 55%, transparent 70%);
      transition: left 0.7s ease;
      z-index: 0;
      pointer-events: none;
    }
    .card:hover::before {
      left: 100%;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: rgba(180, 140, 255, 0.5);
      box-shadow: 0 28px 45px -12px rgba(120, 80, 220, 0.5), 0 0 0 1px rgba(200, 150, 255, 0.2) inset;
      background: rgba(255, 255, 255, 0.07);
    }

    .card-icon {
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(5px);
      box-shadow: 0 8px 18px -8px rgba(0,0,0,0.4);
      transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
      z-index: 1;
      font-size: 2.5rem;
    }

    .card:hover .card-icon {
      transform: scale(1.1) rotate(2deg);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 25px -8px rgba(180, 130, 255, 0.4);
    }

    .card h3 {
      font-size: 1.5rem;
      font-weight: 650;
      letter-spacing: 0.3px;
      color: #f1f5f9;
      z-index: 1;
      transition: color 0.2s;
      margin: 0;
    }
    .card:hover h3 {
      color: #ffffff;
    }

    .card p {
      font-size: 0.95rem;
      color: #9ca3c0;
      z-index: 1;
      transition: color 0.3s;
      margin: 0;
      line-height: 1.4;
    }
    .card:hover p {
      color: #d1d5e6;
    }

    .page-title {
      font-family: 'KaiTi', 'STKaiti', '楷体', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #e2e8ff, #c7b9ff, #f5c8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 20px rgba(130, 100, 250, 0.5));
      text-align: center;
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f1f5f9;
      margin: 2rem 0 1.5rem;
      padding-left: 1rem;
      border-left: 4px solid #818cf8;
    }

    .detail-box {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .footer {
      width: 100%;
      text-align: center;
      padding: 2.5rem 1rem;
      color: #6b7280;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(10, 12, 22, 0.6);
      backdrop-filter: blur(8px);
      margin-top: auto;
      z-index: 2;
    }

    @media (max-width: 900px) {
      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 500px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }
      .navbar {
        flex-direction: column;
        gap: 0.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>
  <div class="bg-glow bottom"></div>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <img src="logo.webp" alt="logo"> Wakfu·攻略 <span>Beta</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="beginner.html">新手入门</a></li>
      <li><a href="analysis.html">战斗分析</a></li>
      <li><a href="dungeon.html">副本攻略</a></li>
      <li><a href="class.html">职业攻略</a></li>
    </ul>
  </nav>

  <main id="app"></main>

  <footer class="footer">
    <p>Wakfu 攻略站 · 玩家共建的非官方中文资料站</p>
    <p style="margin-top: 0.5rem;">game content © Ankama. 网站仅供学习交流</p>
  </footer>

  <script>
    const classesData = [
      { name: "弓箭手 (Cra)", slug: "cra", role: "远程输出 / 高单体伤害", icon: "🏹", description: "百步穿杨的远程狙击专家，擅长远距离爆发与位移。" },
      { name: "幸运猫 (Ecaflip)", slug: "ecaflip", role: "赌博型输出 / 辅助", icon: "🍀", description: "依赖运气的赌徒，抽牌机制带来极高上限。" },
      { name: "治愈者 (Eniripsa)", slug: "eniripsa", role: "治疗 / 辅助", icon: "💉", description: "团队续航核心，提供生命恢复与增益驱散。" },
      { name: "宝藏猎人 (Enutrof)", slug: "enutrof", role: "宝藏搜寻 / 控制", icon: "💰", description: "利用宝藏系统和地雷进行区域控制与资源获取。" },
      { name: "守护者 (Feca)", slug: "feca", role: "坦克 / 护盾辅助", icon: "🛡️", description: "坚不可摧的防线制造者，为全队提供无敌护盾。" },
      { name: "骑士 (Iop)", slug: "iop", role: "近战爆发 / 坦克", icon: "⚔️", description: "冲锋陷阵的狂战士，越战越勇的近战绞肉机。" },
      { name: "唤兽师 (Osamodas)", slug: "osamodas", role: "召唤 / 辅助", icon: "🐉", description: "指挥召唤兽淹没敌人，多功能战术大师。" },
      { name: "熊猫武僧 (Pandawa)", slug: "pandawa", role: "控制 / 搬运", icon: "🐼", description: "精通醉拳与酒桶搬运，战场地形操控者。" },
      { name: "刺客 (Sram)", slug: "sram", role: "隐身 / 陷阱爆发", icon: "🗡️", description: "阴影中的处刑者，布置陷阱与毒药一击毙命。" },
      { name: "植物术士 (Sadida)", slug: "sadida", role: "控制 / 召唤植物", icon: "🌿", description: "自然盟友，召唤荆棘与玩偶进行区域封锁。" },
      { name: "时间术士 (Xelor)", slug: "xelor", role: "行动力操控 / 爆发", icon: "⏳", description: "掌控时间沙漏，操控AP/MP的战术核心。" },
      { name: "盗贼 (Rogue)", slug: "rogue", role: "炸弹爆破 / 远程", icon: "💣", description: "埋设连锁炸弹的爆破鬼才，毁灭性AOE。" },
      { name: "面具师 (Masqueraider)", slug: "masqueraider", role: "近战 / 位移", icon: "🎭", description: "穿梭战场的假面舞者，兼具近战压制与机动性。" },
      { name: "异度旅者 (Eliotrope)", slug: "eliotrope", role: "传送 / 远程输出", icon: "🌀", description: "利用传送门进行立体打击，高机动炮台。" },
      { name: "萨满 (Huppermage)", slug: "huppermage", role: "元素连携 / 全能", icon: "🔮", description: "四元素流转的魔法骑士，连招华丽的全能决斗者。" }
    ];

    const demoSkills = [
      { name: 'Raining Arrow', ap: 3, element: '🔥 火', desc: '对区域造成范围伤害。' },
      { name: 'Destructive Arrow', ap: 5, element: '🔥 火', desc: '高倍率单体爆发。' },
      { name: 'Retreat Arrow', ap: 2, element: '💧 水', desc: '向后跳跃并对沿途敌人造成伤害。' },
    ];
  </script>

  <script>
    (function () {
      const app = document.getElementById('app');

      function renderTemplate(html) {
        app.innerHTML = html;
      }

      function classCard(c) {
        return `
          <a href="#/classes/${c.slug}" class="card">
            <div class="card-icon">${c.icon || '🎯'}</div>
            <h3>${c.name}</h3>
            <p>${c.role}</p>
          </a>
        `;
      }

      function renderHome() {
        const cardsHtml = classesData.map(c => classCard(c)).join('');
        const html = `
          <h1 class="page-title">全部职业</h1>
          <div class="cards-grid">
            ${cardsHtml}
          </div>
        `;
        renderTemplate(html);
      }


      function renderClassesIndex() {
        const cardsHtml = classesData.map(c => classCard(c)).join('');
        const html = `
          <h1 class="page-title">职业攻略</h1>
          <p style="text-align: center; color: #9ca3c0; margin-bottom: 2rem;">共 ${classesData.length} 个职业，点击卡片查看详细技能、Build 与连招。</p>
          <div class="cards-grid">
            ${cardsHtml}
          </div>
        `;
        renderTemplate(html);
      }

      function renderClassDetail(slug) {
        const classData = classesData.find(c => c.slug === slug);
        if (!classData) {
          window.location.hash = '#/classes';
          return;
        }

        const skillsRows = demoSkills.map(skill => `
          <tr style="border-top: 1px solid rgba(255,255,255,0.08);">
            <td style="padding: 0.8rem;">${skill.name}</td>
            <td style="padding: 0.8rem;">${skill.ap}</td>
            <td style="padding: 0.8rem;">${skill.element}</td>
            <td style="padding: 0.8rem;">${skill.desc}</td>
          </tr>
        `).join('');

        const html = `
          <div style="max-width: 900px; margin: 0 auto;">
            <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem;">
              <div class="card-icon">${classData.icon}</div>
              <div>
                <h1 class="page-title" style="margin-bottom: 0.5rem; text-align: left;">${classData.name}</h1>
                <p style="color: #9ca3c0;">${classData.role}</p>
              </div>
            </div>

            <p style="margin-bottom: 2rem; line-height: 1.6;">${classData.description}</p>

            <div class="detail-box">
              <h2 class="section-title" style="margin-top: 0;">⚡ 核心技能（示例）</h2>
              <table style="width: 100%; text-align: left; border-collapse: collapse;">
                <thead>
                  <tr style="background: rgba(255,255,255,0.05);">
                    <th style="padding: 0.8rem;">技能名</th>
                    <th style="padding: 0.8rem;">AP</th>
                    <th style="padding: 0.8rem;">元素</th>
                    <th style="padding: 0.8rem;">描述</th>
                  </tr>
                </thead>
                <tbody>
                  ${skillsRows}
                </tbody>
              </table>
            </div>

            <div class="detail-box">
              <h3 style="font-weight: 700; margin-bottom: 1rem; color: #f1f5f9;">📐 推荐 Build（示例）</h3>
              <p style="line-height: 1.6;">火系 PVE：主智力，辅敏捷。核心被动选择 A > B > C...</p>
              <p style="color: #6b7280; font-size: 0.9rem; margin-top: 1rem;">* 详细构筑请等待玩家贡献</p>
            </div>
          </div>
        `;
        renderTemplate(html);
      }

      function renderNotFound() {
        const html = `
          <h1 class="page-title">404</h1>
          <p style="text-align: center; color: #9ca3c0; margin-bottom: 2rem;">页面未找到</p>
          <p style="text-align: center;"><a href="index.html" style="color: #818cf8;">返回首页</a></p>
        `;
        renderTemplate(html);
      }

      function handleRoute() {
        const hash = window.location.hash.slice(1) || '/';
        const path = hash.startsWith('/') ? hash : '/' + hash;
        const parts = path.split('/').filter(Boolean);

        if (parts.length === 0) {
          renderHome();
        } else if (parts[0] === 'classes') {
          if (parts.length === 1) {
            renderClassesIndex();
          } else if (parts.length === 2) {
            renderClassDetail(parts[1]);
          } else {
            renderNotFound();
          }
        } else {
          renderNotFound();
        }
      }

      window.addEventListener('hashchange', handleRoute);
      window.addEventListener('DOMContentLoaded', handleRoute);
    })();
  </script>
</body>

</html>
