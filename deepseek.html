      // ========== 路由器 ==========
      function handleRoute() {
        const hash = window.location.hash.slice(1) || '/';
        // 解析路径：如 /classes/cra
        const path = hash.startsWith('/') ? hash : '/' + hash;
        const parts = path.split('/').filter(Boolean);

        if (parts.length === 0) {
          renderHome();
        } else if (parts[0] === 'newbie') {
          renderNewbie();
        } else if (parts[0] === 'classes') {
          if (parts.length === 1) {
            renderClassesIndex();
          } else if (parts.length === 2) {
            renderClassDetail(parts[1]);
          } else {
            renderNotFound();
          }
        } else if (parts[0] === 'dungeons') {
          renderDungeons();
        } else {
          renderNotFound();
        }
      }

      // 监听 hash 变化
      window.addEventListener('hashchange', handleRoute);
      // 初始加载
      window.addEventListener('DOMContentLoaded', handleRoute);

      }

      function applyTheme() {
        const stored = localStorage.getItem('theme');
        if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          htmlTag.classList.add('dark');
        } else {
          htmlTag.classList.remove('dark');
        }
      }

      themeBtn.addEventListener('click', () => {
        htmlTag.classList.toggle('dark');
        const isDark = htmlTag.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });

      applyTheme();

      // 移动端菜单切换（简单实现）
      const mobileMenuBtn = document.querySelector('header button[aria-label="切换暗色模式"]'); // 附近的菜单按钮需要另外添加，这里提供一个简化方案
      // 我们给 header 添加一个移动端菜单按钮，但当前结构中没有，所以补充一个按钮（如果不想改动太多，可以在导航栏左侧添加图标）
      // 为了完整性，在 header 的 nav 内最前面添加一个移动端菜单按钮
      const nav = document.querySelector('header nav');
      const mobileMenu = document.getElementById('mobile-menu');
      const menuToggleBtn = document.createElement('button');
      menuToggleBtn.className = 'md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800';
      menuToggleBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>';
      menuToggleBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
      });
      nav.insertBefore(menuToggleBtn, nav.firstChild);

      // 点击导航链接时关闭移动菜单
      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          mobileMenu.classList.add('hidden');
        });
      });
      // 点击页面其他区域关闭菜单
      document.addEventListener('click', (e) => {
        if (!mobileMenu.contains(e.target) && e.target !== menuToggleBtn && !menuToggleBtn.contains(e.target)) {
          mobileMenu.classList.add('hidden');
        }
      });

    })();
  </script>
</body>

</html>
