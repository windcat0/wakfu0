<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Wakfu 攻略站 · 万象之扉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', system-ui, sans-serif;
      background: radial-gradient(ellipse at 20% 30%, #1a1e2f 0%, #0b0d17 70%);
      background-attachment: fixed;
      color: #e6e9f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 70vw;
      height: 70vh;
      background: radial-gradient(circle at 50% 40%, rgba(90, 130, 255, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
    }
    .bg-glow.bottom {
      top: auto;
      bottom: -15%;
      left: auto;
      right: -5%;
      background: radial-gradient(circle at 50% 50%, rgba(210, 80, 180, 0.1) 0%, transparent 70%);
      width: 60vw;
      height: 60vh;
    }

    /* 导航栏 - 毛玻璃 */
    .navbar {
      position: sticky;
      top: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 5%;
      background: rgba(18, 20, 30, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #b3cdff 0%, #a78bfa 60%, #f0abfc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(167, 139, 250, 0.6));
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo span {
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.1);
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-weight: 400;
      -webkit-text-fill-color: #ccc;
      background-clip: unset;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
    }
    .nav-links a {
      color: #b9c2d9;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: color 0.2s, text-shadow 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      transition: width 0.3s ease;
      border-radius: 2px;
    }
    .nav-links a:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(200, 180, 255, 0.7);
    }
    .nav-links a:hover::after {
      width: 100%;
    }

    /* HERO 区域 */
    .hero {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1300px;
      margin: 1.5rem auto 0.5rem;
      padding: 1.5rem 5%;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(2.8rem, 8vw, 4.8rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #e2e8ff, #c7b9ff, #f5c8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 20px rgba(130, 100, 250, 0.5));
    }
    .hero .subtitle {
      font-size: 1.3rem;
      color: #94a3c8;
      max-width: 700px;
      margin: 0 auto 2rem;
      font-weight: 400;
    }
    .hero .accent-line {
      width: 120px;
      height: 4px;
      background: linear-gradient(90deg, #6d28d9, #d946ef);
      margin: 0 auto 2rem;
      border-radius: 4px;
      box-shadow: 0 0 18px #a78bfa;
    }

    /* 卡片网格 - 每行4个 */
    .cards-section {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1350px;
      padding: 1rem 5% 4rem;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.8rem;
      justify-content: center;
    }

    /* 卡片样式 */
    .card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 2rem 1.5rem 1.8rem;
      transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s, border-color 0.3s, background 0.3s;
      cursor: default;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.9rem;
      box-shadow: 0 15px 35px -15px rgba(0, 0, 0, 0.5);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(105deg, transparent 30%, rgba(255, 255, 255, 0.04) 45%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.04) 55%, transparent 70%);
      transition: left 0.7s ease;
      z-index: 0;
      pointer-events: none;
    }
    .card:hover::before {
      left: 100%;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: rgba(180, 140, 255, 0.5);
      box-shadow: 0 28px 45px -12px rgba(120, 80, 220, 0.5), 0 0 0 1px rgba(200, 150, 255, 0.2) inset;
      background: rgba(255, 255, 255, 0.07);
    }

    .card:nth-child(1):hover { border-color: #60a5fa; box-shadow: 0 28px 45px -12px #3b82f6; }
    .card:nth-child(2):hover { border-color: #f472b6; box-shadow: 0 28px 45px -12px #ec4899; }
    .card:nth-child(3):hover { border-color: #fbbf24; box-shadow: 0 28px 45px -12px #f59e0b; }
    .card:nth-child(4):hover { border-color: #34d399; box-shadow: 0 28px 45px -12px #10b981; }
    .card:nth-child(5):hover { border-color: #a78bfa; box-shadow: 0 28px 45px -12px #8b5cf6; }
    .card:nth-child(6):hover { border-color: #fb923c; box-shadow: 0 28px 45px -12px #f97316; }
    .card:nth-child(7):hover { border-color: #38bdf8; box-shadow: 0 28px 45px -12px #0ea5e9; }
    .card:nth-child(8):hover { border-color: #e879f9; box-shadow: 0 28px 45px -12px #d946ef; }

    .card-icon {
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(5px);
      box-shadow: 0 8px 18px -8px rgba(0,0,0,0.4);
      transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
      z-index: 1;
    }

    .card-icon svg {
      width: 40px;
      height: 40px;
      transition: transform 0.3s, filter 0.3s;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    }

    .card:hover .card-icon {
      transform: scale(1.1) rotate(2deg);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 25px -8px rgba(180, 130, 255, 0.4);
    }
    .card:hover .card-icon svg {
      transform: scale(1.08);
      filter: drop-shadow(0 0 10px rgba(220, 210, 255, 0.7));
    }

    .card h3 {
      font-size: 1.5rem;
      font-weight: 650;
      letter-spacing: 0.3px;
      color: #f1f5f9;
      z-index: 1;
      transition: color 0.2s;
      margin: 0;
    }
    .card:hover h3 {
      color: #ffffff;
    }

    .card p {
      font-size: 0.95rem;
      color: #9ca3c0;
      z-index: 1;
      transition: color 0.3s;
      margin: 0;
      line-height: 1.4;
    }
    .card:hover p {
      color: #d1d5e6;
    }

    /* 页脚 */
    .footer {
      width: 100%;
      text-align: center;
      padding: 2.5rem 1rem;
      color: #6b7280;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(10, 12, 22, 0.6);
      backdrop-filter: blur(8px);
      margin-top: auto;
      z-index: 2;
    }

    /* 响应式调整 */
    @media (max-width: 900px) {
      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 500px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }
      .navbar {
        flex-direction: column;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow bottom"></div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <a href="#" class="logo">
      ⚔️ Wakfu·攻略 <span>Beta</span>
    </a>
    <ul class="nav-links">

      <div class="card">

      <div class="card">

    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <p>© 2026 Wakfu Guide · 万象之扉 — 为冒险者而生 · 非官方玩家攻略站</p>
  </footer>
</body>
</html>
